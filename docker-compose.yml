version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# ForgeFit — LOCAL DOCKER STACK
# Runs on your laptop. Serves the API and PostgreSQL only.
# The frontend (HTML/CSS/JS) is hosted separately on Vercel / Cloudflare Pages.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: forgefit_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: forgefit
      POSTGRES_USER: forgefit_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    # Only expose DB port locally — never expose 5432 to the internet
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgefit_user -d forgefit"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js API ────────────────────────────────────────────────────────────
  api:
    build: ./backend
    container_name: forgefit_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: forgefit
      DB_USER: forgefit_user
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      # Your Vercel / Cloudflare Pages URL — used for CORS
      # Also add your ngrok/tunnel URL here (see .env)
      FRONTEND_URL: ${FRONTEND_URL}
      FRONTEND_URL_2: ${FRONTEND_URL_2:-}
    ports:
      # API is accessible at http://localhost:3001 on your laptop
      # Your tunnel (ngrok/Cloudflare) will expose this to the internet
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  pg_data:

# ─────────────────────────────────────────────────────────────────────────────
# NO NGINX — frontend is static, hosted on Vercel/Cloudflare Pages
# ─────────────────────────────────────────────────────────────────────────────
